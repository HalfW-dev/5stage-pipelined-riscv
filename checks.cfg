[options]
isa rv32i

# The depth is how many clock cycles the tool looks into the future.
# 20 is usually enough for a 5-stage pipeline.
[depth]
insn            20

[defines]
`define RISCV_FORMAL

[script-sources]
# List ALL your SystemVerilog files here
read_verilog -sv topmodule_RISCV.sv
read_verilog -sv IF/IF_stage.sv
read_verilog -sv ID/ID_stage.sv
read_verilog -sv EX/EX_stage.sv
read_verilog -sv MEM/MEM_stage.sv
read_verilog -sv WB/WB_stage.sv
read_verilog -sv IFID_reg.sv
read_verilog -sv IDEX_reg.sv
read_verilog -sv EXMEM_reg.sv
read_verilog -sv MEMWB_reg.sv
read_verilog -sv cu.sv
read_verilog -sv forward.sv
read_verilog -sv hazard_unit.sv
# Do not include imem.sv or dmem.sv (we disabled them)

[riscv-formal-checks]
# This section auto-generates checks for every instruction
rvfi_insn_check
rvfi_reg_check
rvfi_pc_check

[cover]
# Optional: specific coverage points
always @* if (rvfi_valid) cover (rvfi_order == 5);